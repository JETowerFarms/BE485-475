plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.facebook.react"
}

react {
    // Defaults work for CLI; no Expo entry file
}

// Set this to true to run Proguard on release builds
def enableProguardInReleaseBuilds = false

// Preferred JavaScriptCore flavor when Hermes is disabled
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.anonymous.OptimizationTool'
    defaultConfig {
        applicationId 'com.anonymous.OptimizationTool'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            shrinkResources false
        }
    }
}

configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.12.0'
        force 'androidx.core:core-ktx:1.12.0'
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    implementation project(":@react-native-async-storage_async-storage")
    implementation project(":@react-native-community_slider")
    implementation project(":react-native-gesture-handler")
    implementation project(":react-native-reanimated")
    implementation project(":react-native-svg")
    implementation project(":react-native-webview")
    implementation project(":react-native-worklets")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
