plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.facebook.react"
}

react {
    // Defaults work for CLI; no Expo entry file
}

// Set this to true to run Proguard on release builds
def enableProguardInReleaseBuilds = false

// Preferred JavaScriptCore flavor when Hermes is disabled
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.anonymous.OptimizationTool'
    defaultConfig {
        applicationId 'com.anonymous.OptimizationTool'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            shrinkResources false
        }
    }
}

configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.12.0'
        force 'androidx.core:core-ktx:1.12.0'
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    implementation project(":react-native-gesture-handler")
    implementation project(":react-native-async-storage_async-storage")
    implementation project(":react-native-mmkv")
    implementation project(":react-native-nitro-modules")
    implementation project(":react-native-reanimated")
    implementation project(":react-native-safe-area-context")
    implementation project(":react-native-svg")
    implementation project(":react-native-webview")
    implementation project(":react-native-worklets")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// Skip external native clean if codegen JNI directories are missing.
def nodeModulesDir = rootProject.projectDir.parentFile.toPath().resolve("node_modules").toFile()
def codegenJniDirs = [
    "@react-native-async-storage/async-storage/android/build/generated/source/codegen/jni",
        "react-native-gesture-handler/android/build/generated/source/codegen/jni",
        "react-native-nitro-modules/android/build/generated/source/codegen/jni",
        "react-native-reanimated/android/build/generated/source/codegen/jni",
        "react-native-webview/android/build/generated/source/codegen/jni",
        "react-native-worklets/android/build/generated/source/codegen/jni",
        "react-native-safe-area-context/android/build/generated/source/codegen/jni",
        "react-native-svg/android/build/generated/source/codegen/jni",
]
def hasAllCodegenJni = {
    codegenJniDirs.every { relativePath ->
        def dir = new File(nodeModulesDir, relativePath)
        return dir.exists() && new File(dir, "CMakeLists.txt").exists()
    }
}

tasks.matching { it.name.startsWith("externalNativeBuildClean") }.configureEach {
    onlyIf { hasAllCodegenJni() }
}
