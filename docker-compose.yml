services:
  # Backend API server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: michigan-solar-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: michigan_solar
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://10.0.2.2:8080}
      RATE_LIMIT_WINDOW_MS: 15
      RATE_LIMIT_MAX_REQUESTS: 1000
    ports:
      - "3001:3000"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/src:/app/src
      - ./backend/data:/app/data
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - solar-network

  # pgAdmin for database management (optional, for development) - accessible at http://localhost:5051
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: michigan-solar-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@solar.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - solar-network
    profiles:
      - dev

  # Reverse proxy entrypoint for PolyfarmBE487.com
  proxy:
    image: caddy:2-alpine
    container_name: polyfarm-proxy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - solar-network

volumes:
  pgadmin_data:
    driver: local

networks:
  solar-network:
    driver: bridge
