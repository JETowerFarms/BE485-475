version: '3.8'

services:
  # PostgreSQL database with PostGIS
  db:
    image: postgis/postgis:14-3.3
    container_name: michigan-solar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: michigan_solar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solarpassword123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d michigan_solar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solar-network

  # Backend API server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: michigan-solar-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: michigan_solar
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-solarpassword123}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RATE_LIMIT_WINDOW: 15
      RATE_LIMIT_MAX: 100
    ports:
      - "3000:3000"
    volumes:
      - ./backend/logs:/app/logs
      # Mount solar data for import (optional, for initial data load)
      - ./michiganSolarSuitability_30x30.json:/app/data/michiganSolarSuitability_30x30.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - solar-network

  # pgAdmin for database management (optional, for development)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: michigan-solar-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@solar.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - solar-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  solar-network:
    driver: bridge
