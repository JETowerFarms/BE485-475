version: '3.8'

services:
  # PostgreSQL database with PostGIS
  db:
    build:
      context: ./backend/db
      dockerfile: Dockerfile
    image: michigan-solar-db-local
    container_name: michigan-solar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: michigan_solar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solarpassword123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/sql:/sql:ro
      - ./Datasets:/datasets:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d michigan_solar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solar-network

  # Backend API server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: michigan-solar-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: michigan_solar
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-solarpassword123}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://polyfarmbe487.com}
      RATE_LIMIT_WINDOW: 15
      RATE_LIMIT_MAX: 100
    ports:
      - "3001:3000"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - solar-network

  # pgAdmin for database management (optional, for development)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: michigan-solar-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@solar.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - solar-network
    profiles:
      - dev

  # Reverse proxy entrypoint for PolyfarmBE487.com
  proxy:
    image: nginx:stable-alpine
    container_name: polyfarm-proxy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Optional: mount a built web bundle at ./deploy/nginx/html
      - ./deploy/nginx/html:/usr/share/nginx/html:ro
    environment:
      # Document the backend upstream for templating if desired
      - API_UPSTREAM=http://api:3000
    networks:
      - solar-network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  solar-network:
    driver: bridge
